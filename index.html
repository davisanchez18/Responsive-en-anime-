<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimetsu no Yaiba - Proyecto Responsivo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Cazadores de Demonios: Los Pilares y Protagonistas</h1>
        <p>Explora el mundo de Kimetsu no Yaiba con un diseño adaptativo.</p>
    </header>

    <main class="container">
        
        <figure>
            <img src="https://i.pinimg.com/control1/736x/fb/6c/70/fb6c70673edc0c64f9f816696d97b57f.jpg" alt="Tanjiro Kamado con su uniforme de cazador y su caja de madera en la espalda">
            <figcaption>
                <h3>Tanjiro Kamado</h3>
                <p>Un joven de corazón noble que se une al Cuerpo de Cazadores de Demonios para encontrar una cura para su hermana Nezuko y vengar a su familia. Utiliza la Respiración del Agua y la Danza del Dios del Fuego.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://i.pinimg.com/control1/736x/1c/a6/28/1ca62848f32e44fdcf97a474ffa51310.jpg" alt="Nezuko Kamado en su forma de demonio con el bambú en la boca">
            <figcaption>
                <h3>Nezuko Kamado</h3>
                <p>A pesar de haber sido convertida en demonio, Nezuko mantiene sus emociones humanas y protege a su hermano. Tiene la capacidad de regenerarse y usar técnicas de sangre demoníaca poderosas.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://i.pinimg.com/736x/64/0a/57/640a57839bf0ddb9012ce545f36c57b3.jpg" alt="Zenitsu Agatsuma vestido de niña">
            <figcaption>
                <h3>Zenitsu Agatsuma</h3>
                <p>Un cazador talentoso pero temeroso que solo muestra su verdadero poder cuando se queda dormido. Es un maestro de la Respiración del Rayo, enfocándose principalmente en la primera postura.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://i.pinimg.com/736x/32/9a/76/329a76f1b6757280722c57a8354228ca.jpg" alt="Inosuke Hashibira usando su máscara de jabalí y sus dos espadas dentadas">
            <figcaption>
                <h3>Inosuke Hashibira</h3>
                <p>Criado por jabalíes en la montaña, Inosuke es un guerrero impulsivo que utiliza la Respiración de la Bestia. Su flexibilidad y sentido del tacto son sobrehumanos.</p>
            </figcaption>
        </figure>

        <figure>
            <img src="https://i.pinimg.com/736x/62/c7/c6/62c7c63f21014e6c19154c523445775e.jpg" alt="Kyojuro Rengoku, el Pilar de la Llama, con su capa blanca y roja">
            <figcaption>
                <h3>Kyojuro Rengoku</h3>
                <p>El entusiasta Pilar de la Llama. Su espíritu inquebrantable y su dominio de la espada inspiraron profundamente a Tanjiro durante la batalla en el Tren Infinito. ¡Manten tu corazón ardiendo!</p>
            </figcaption>
        </figure>

    </main>

    <footer>
        <p>&copy; 2026 - Fan Page de Kimetsu no Yaiba - Proyecto de Diseño Responsivo</p>
    </footer>

</body>
</html>
